    <body>
        <div class="form-container">
            <h2>Project Metadata</h2>
            <form id="projectForm">

                    <label for="studentName">Student Name</label>

                </div>

                <div class="form-group">
                    <label for="topic">Project Topic</label>
                    <input type="text" id="topic" required />
                </div>

                <div class="form-group">
                    <label for="subDate">Submission Date</label>
                    <input type="date" id="subDate" required />
                </div>

                <div class="form-group">
                    <label for="supervisor">Project Supervisor</label>
                    <select id="supervisor" required>

                        <option

                        </option>
                        <option
                            value="Asad Arzoo"
                            data-title="Assistant Professor"
                        >
                            Mosatfizur Rahman
                        </option>
                        <option
                            value="Dr.Subarna Ganguli"
                            data-title="Principal"
                        >
                            Dr. Subarna Ganguli
                        </option>
                    </select>
                </div>
            </form>

            <div class="button-group">

                   <button

                <button type="button" onclick="goToPage('Pages/Dec.html')">

                <button type="button" onclick="goToPage('Pages/Ack.html')">

                <button type="button" onclick="goToPage('Pages/Content.html')">

                <button

                </button>
                <button
                    type="button"
                    onclick="goToPage('Pages/Physiology.html')"
                >
                    Physiology
                </button>
            </div>
        </div>

        <script>
            const formFields = [
                "studentName",
                "regNumber",
                "rollNumber",
                "topic",
                "subDate",
                "supervisor"
            ];

            window.addEventListener("DOMContentLoaded", () => {
                formFields.forEach(fieldId => {
                    const el = document.getElementById(fieldId);
                    const savedValue = localStorage.getItem(fieldId);
                    if (savedValue && el) {
                        el.value = savedValue;
                    }
                });
            });

            const saveToLocal = () => {
                formFields.forEach(fieldId => {
                    const el = document.getElementById(fieldId);
                    if (el) {
                        localStorage.setItem(fieldId, el.value);
                    }
                });

                const supSelect = document.getElementById("supervisor");
                if (supSelect.selectedIndex > 0) {
                    const selectedOption =
                        supSelect.options[supSelect.selectedIndex];
                    localStorage.setItem(
                        "supervisorTitle",
                        selectedOption.getAttribute("data-title")
                    );
                }
            };

            formFields.forEach(fieldId => {
                const el = document.getElementById(fieldId);
                if (el) {
                    el.addEventListener("input", saveToLocal);
                    el.addEventListener("change", saveToLocal);
                }
            });

            function goToPage(url) {
                const form = document.getElementById("projectForm");

                if (form.reportValidity()) {
                    saveToLocal();
                    window.location.href = url;
                }
            }
        </script>
    </body>
</html>

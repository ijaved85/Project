        <script>
            const formFields = [
                "studentName",
                "regNumber",
                
                "topic",
                "subDate",
                "supervisor"
            ];

            window.addEventListener("DOMContentLoaded", () => {
                formFields.forEach(fieldId => {
                    const el = document.getElementById(fieldId);
                    const savedValue = localStorage.getItem(fieldId);
                    if (savedValue && el) {
                        el.value = savedValue;
                    }
                });
            });

            const saveToLocal = () => {
                formFields.forEach(fieldId => {
                    const el = document.getElementById(fieldId);
                    if (el) {
                        localStorage.setItem(fieldId, el.value);
                    }
                });

                const supSelect = document.getElementById("supervisor");
                if (supSelect.selectedIndex > 0) {
                    const selectedOption =
                        supSelect.options[supSelect.selectedIndex];
                    localStorage.setItem(
                        "supervisorTitle",
                        selectedOption.getAttribute("data-title")
                    );
                }
            };

            formFields.forEach(fieldId => {
                const el = document.getElementById(fieldId);
                if (el) {
                    el.addEventListener("input", saveToLocal);
                    el.addEventListener("change", saveToLocal);
                }
            });

            function goToPage(url) {
                const form = document.getElementById("projectForm");

                if (form.reportValidity()) {
                    saveToLocal();
                    window.location.href = url;
                }
            }
        </script>
